<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인정보 처리방침 모음</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background: #f8f7ff;
      color: #2d2d2d;
      min-height: 100vh;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }
    header {
      text-align: center;
      margin-bottom: 48px;
    }
    header .developer {
      font-size: 13px;
      color: #888;
      margin-bottom: 10px;
      letter-spacing: 0.5px;
    }
    header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #4a3f8f;
      margin-bottom: 8px;
    }
    header p {
      font-size: 14px;
      color: #888;
    }
    .app-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .app-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      box-shadow: 0 1px 6px rgba(108,92,231,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.15s, transform 0.15s;
      border: 1px solid #ece9ff;
    }
    .app-card:hover {
      box-shadow: 0 4px 16px rgba(108,92,231,0.15);
      transform: translateY(-1px);
    }
    .app-info {}
    .app-name {
      font-size: 16px;
      font-weight: 600;
      color: #2d2d2d;
      margin-bottom: 4px;
    }
    .app-desc {
      font-size: 13px;
      color: #888;
    }
    .app-updated {
      font-size: 12px;
      color: #bbb;
      white-space: nowrap;
      margin-left: 16px;
    }
    .arrow {
      color: #6c5ce7;
      font-size: 18px;
      margin-left: 12px;
    }
    .coming-soon {
      opacity: 0.45;
      pointer-events: none;
    }
    .badge {
      font-size: 11px;
      background: #f0eeff;
      color: #6c5ce7;
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 8px;
      font-weight: 500;
    }
    footer {
      text-align: center;
      margin-top: 48px;
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="developer">[본인 이름] · Android Developer</div>
    <h1>개인정보 처리방침</h1>
    <p>각 앱의 처리방침을 확인하실 수 있습니다.</p>
  </header>

  <div class="app-list">

    <!-- 약 앱 -->
    <a href="./medication-app/" class="app-card">
      <div class="app-info">
        <div class="app-name">약 복용 관리 앱<span class="badge">배포 예정</span></div>
        <div class="app-desc">약 봉지 스캔 · 복약 알람 · 복용 기록</div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="app-updated">2026.xx.xx</div>
        <div class="arrow">›</div>
      </div>
    </a>

    <!-- Cardly -->
    <a href="./cardly/" class="app-card coming-soon">
      <div class="app-info">
        <div class="app-name">Cardly<span class="badge">준비 중</span></div>
        <div class="app-desc">스페이스드 리피티션 플래시카드</div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="app-updated">-</div>
        <div class="arrow">›</div>
      </div>
    </a>

    <!-- 추후 앱 추가 시 아래 카드 복사해서 사용 -->
    <!--
    <a href="./앱폴더명/" class="app-card">
      <div class="app-info">
        <div class="app-name">앱 이름</div>
        <div class="app-desc">앱 설명</div>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <div class="app-updated">시행일</div>
        <div class="arrow">›</div>
      </div>
    </a>
    -->

  </div>

  <footer>
    © 2026 [본인 이름] · <a href="mailto:[본인 이메일]" style="color:#aaa;">[본인 이메일]</a>
  </footer>

</div>
</body>
</html>
